spring.application.name=notification-service
server.port=8086

# EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8081/eureka}
eureka.client.fetch-registry=true


# RABBIMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:rota-facil}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}

# RABBITMQ TRANSPORT
rabbitmq.transport.exchange=${RABBITMQ_TRANSPORT_EXCHANGE:transport.events}
# queues
#rabbitmq.notification.route.finished.queue=${RABBITMQ_NOTIFICATION_ROUTE_FINISHED_QUEUE:notification.route.finished.queue}
rabbitmq.notification.route.cancelled.queue=${RABBITMQ_NOTIFICATION_ROUTE_CANCELLED_QUEUE:notification.route.cancelled.queue}
# routing key
#rabbitmq.route.finished.routing.key=${RABBITMQ_ROUTE_FINISHED_ROUTING_KEY:route.finished.routing.key}
rabbitmq.route.cancelled.routing.key=${RABBITMQ_ROUTE_CANCELLED_ROUTING_KEY:route.cancelled.routing.key}